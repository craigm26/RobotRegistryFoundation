name = "robot-registry-foundation"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# KV namespace — PENDING: needs Workers KV Edit permission on CF token
# Steps to activate:
#   1. Go to Cloudflare Dashboard → Workers & Pages → KV → Create namespace "RRF_KV"
#   2. Copy the namespace ID
#   3. Uncomment and fill in below, then redeploy
#   4. Set signing key: npx wrangler secret put RRF_SIGNING_KEY
#      Value: KMBbCEDYvJP2pEOXSpcdcPoKjV0cNFZDifgPTTVGM-I=
#
# [[kv_namespaces]]
# binding = "RRF_KV"
# id      = "<PASTE_NAMESPACE_ID_HERE>"
