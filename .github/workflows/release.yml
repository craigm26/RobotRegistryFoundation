name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to emit version-tuple for (defaults to ref_name)'
        required: false

permissions:
  contents: write

jobs:
  emit-version-tuple:
    name: Emit signed version-tuple envelope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.tag.outputs.tag }}" \
              --title "RRF ${{ steps.tag.outputs.tag }}" \
              --generate-notes
          fi

      - name: NO-OP placeholder for materialization (diagnostic)
        run: echo "skipping materialization to test if env-secret references trigger startup_failure"

      - uses: ./.github/actions/emit-version-tuple
        with:
          project: rrf
          ran: ${{ secrets.RRF_RELEASE_RAN }}
          field: registry_api_version
          value: ${{ steps.tag.outputs.version }}
          depends_on: '{"protocol_version":">=3.2.0"}'
          pq_key_path: ${{ runner.temp }}/pq.priv.bin
          pq_kid: ${{ secrets.RRF_RELEASE_KID }}
          ed25519_key_path: ""
          ed25519_kid: ""
          release_tag: ${{ steps.tag.outputs.tag }}
