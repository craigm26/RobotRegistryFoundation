name: Emit version-tuple envelope (v3.3 file-path interface)
description: |
  Build a version-tuple payload, hybrid-sign it (ML-DSA-65 required + optional
  Ed25519), wrap as an envelope, and attach to a GitHub release.

  v3.3 BREAKING CHANGE: pq_signing_key/ed25519_signing_key inputs replaced
  with pq_key_path/ed25519_key_path. The caller workflow must materialize
  keys to files BEFORE invoking this action. This works around a GitHub
  Actions startup_failure that occurs when long secret values (>~1KB) are
  interpolated via ${{ secrets.X }} into composite-action with: blocks.
inputs:
  project:
    description: "Project slug (e.g. robot-md, rcan-py)."
    required: true
  ran:
    description: "RAN of the signing authority (e.g. RAN-000000000010)."
    required: true
  field:
    description: "Which canonical-tuple row this asserts (e.g. registry_api_version)."
    required: true
  value:
    description: "Asserted value (semver for code projects)."
    required: true
  depends_on:
    description: "JSON object of range constraints (e.g. '{\"protocol_version\":\">=3.2.0\"}')."
    required: true
  pq_key_path:
    description: "Filesystem path to ML-DSA-65 raw private key bytes (binary). REQUIRED. Caller materializes the secret to this path BEFORE invoking the action."
    required: true
  pq_kid:
    description: "ML-DSA kid (sha256(pq_pub)[:8].hex()). REQUIRED."
    required: true
  ed25519_key_path:
    description: "Filesystem path to Ed25519 PEM private key. OPTIONAL — if absent (default ''), envelope ships PQ-only."
    required: false
    default: ""
  ed25519_kid:
    description: "Ed25519 kid. REQUIRED when ed25519_key_path is provided; ignored otherwise."
    required: false
    default: ""
  release_tag:
    description: "GitHub release tag to attach the artifact to."
    required: true
runs:
  using: composite
  steps:
    - name: Set BUILD_DATE
      shell: bash
      run: echo "BUILD_DATE_RFC3339=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
    - name: Validate signing key files
      shell: bash
      run: |
        if [ ! -f "${{ inputs.pq_key_path }}" ]; then
          echo "::error::pq_key_path file does not exist: ${{ inputs.pq_key_path }}"
          exit 1
        fi
        if [ -n "${{ inputs.ed25519_key_path }}" ]; then
          if [ ! -f "${{ inputs.ed25519_key_path }}" ]; then
            echo "::error::ed25519_key_path file does not exist: ${{ inputs.ed25519_key_path }}"
            exit 1
          fi
          if [ -z "${{ inputs.ed25519_kid }}" ]; then
            echo "::error::ed25519_kid is required when ed25519_key_path is provided"
            exit 1
          fi
        fi
    - name: Install signing deps
      shell: bash
      run: pip install cryptography dilithium-py
    - name: Build payload
      shell: bash
      run: |
        python3 - <<'PYEOF'
        import json, os, pathlib
        depends = json.loads(os.environ["DEPENDS_ON"])
        payload = {
            "project": os.environ["PROJECT"],
            "matrix_version": "1.0",
            "field": os.environ["FIELD"],
            "value": os.environ["VALUE"],
            "depends_on": depends,
            "released_at": os.environ["BUILD_DATE_RFC3339"],
        }
        pathlib.Path(os.environ["RUNNER_TEMP"], "payload.json").write_text(json.dumps(payload))
        PYEOF
      env:
        PROJECT: ${{ inputs.project }}
        FIELD: ${{ inputs.field }}
        VALUE: ${{ inputs.value }}
        DEPENDS_ON: ${{ inputs.depends_on }}
    - name: Sign envelope
      shell: bash
      run: |
        ED_ARGS=""
        if [ -n "${{ inputs.ed25519_key_path }}" ]; then
          ED_ARGS="--ed-key ${{ inputs.ed25519_key_path }} --ed-kid ${{ inputs.ed25519_kid }}"
        fi
        ENV_FILE="$RUNNER_TEMP/version-tuple-envelope-${{ inputs.field }}.json"
        python3 ${{ github.action_path }}/sign_envelope.py \
          --payload "$RUNNER_TEMP/payload.json" \
          --ran    "${{ inputs.ran }}" \
          --pq-key "${{ inputs.pq_key_path }}" \
          --pq-kid "${{ inputs.pq_kid }}" \
          $ED_ARGS \
          --out    "$ENV_FILE"
        echo "ENV_FILE=$ENV_FILE" >> "$GITHUB_ENV"
    - name: Attach to release
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "${{ inputs.release_tag }}" \
          "$ENV_FILE" \
          --clobber
